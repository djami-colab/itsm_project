{% extends 'tickets/base.html' %}

{% block title %}Paramètres de Profil - ITSM Portal{% endblock %}

{% block content %}
<div style="padding: 2rem;">
    <div style="max-width: 600px; margin: 0 auto;">
        <div style="margin-bottom: 2rem;">
            <a href="javascript:history.back()" class="btn btn-secondary" style="padding: 0.5rem 1rem;">
                <i data-lucide="arrow-left"></i> Retour
            </a>
        </div>

        <div class="card">
            <h1 style="font-family: 'Outfit', sans-serif; font-size: 1.75rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                <i data-lucide="settings" style="vertical-align: middle; margin-right: 0.5rem;"></i>
                Paramètres du Profil
            </h1>

            <form method="POST" style="display: flex; flex-direction: column; gap: 1.5rem;">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username" class="form-label">Nom d'utilisateur</label>
                    <input type="text" id="username" class="form-control" value="{{ user.username }}" readonly style="background: rgba(0,0,0,0.05); cursor: not-allowed;">
                    <small style="color: var(--text-secondary);">Identifiant non modifiable</small>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" value="{{ user.email }}" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="first_name" class="form-label">Prénom</label>
                        <input type="text" id="first_name" name="first_name" class="form-control" value="{{ user.first_name }}" placeholder="Prénom">
                    </div>

                    <div class="form-group">
                        <label for="last_name" class="form-label">Nom</label>
                        <input type="text" id="last_name" name="last_name" class="form-control" value="{{ user.last_name }}" placeholder="Nom">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Rôle</label>
                    <div style="padding: 0.75rem 1rem; background: rgba(99, 102, 241, 0.06); border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); color: #0f172a;">
                        {{ user.role.libelle }}
                    </div>
                </div>

                <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem; margin-top: 1rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="save"></i> Enregistrer les modifications
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
